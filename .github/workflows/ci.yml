name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (${{ matrix.configuration }})
        run: dotnet build -c ${{ matrix.configuration }} --no-restore

      - name: Run tests (if any)
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Path . -Recurse -Include '*Test*.csproj' -File -ErrorAction SilentlyContinue
          if ($testProjects.Count -eq 0) {
            Write-Host 'No test projects found; skipping dotnet test.'
            exit 0
          }

          foreach ($proj in $testProjects) {
            dotnet test $proj.FullName -c ${{ matrix.configuration }} --no-build
          }
